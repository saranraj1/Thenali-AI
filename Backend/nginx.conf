# ─── Thenali AI — Nginx Configuration ────────────────────────────────────────
# File: /etc/nginx/sites-available/thenaliai
#
# Setup:
#   sudo cp nginx.conf /etc/nginx/sites-available/thenaliai
#   sudo ln -s /etc/nginx/sites-available/thenaliai /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d thenaliai.in -d www.thenaliai.in
#   sudo certbot --nginx -d api.thenaliai.in
# ─────────────────────────────────────────────────────────────────────────────

# ─── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name thenaliai.in www.thenaliai.in api.thenaliai.in;

    # Certbot ACME challenge (must be BEFORE the redirect)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Frontend — thenaliai.in / www.thenaliai.in ──────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name thenaliai.in www.thenaliai.in;

    # SSL — paths filled by: sudo certbot --nginx -d thenaliai.in -d www.thenaliai.in
    ssl_certificate     /etc/letsencrypt/live/thenaliai.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thenaliai.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Required for microphone access (voice features)
    add_header Permissions-Policy "microphone=(self)" always;

    # Next.js app on port 3000
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Next.js static assets — aggressive caching
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Next.js public folder
    location /public/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=3600";
    }
}

# ─── API — api.thenaliai.in ──────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.thenaliai.in;

    # SSL — paths filled by: sudo certbot --nginx -d api.thenaliai.in
    ssl_certificate     /etc/letsencrypt/live/api.thenaliai.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.thenaliai.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Allow large uploads (ZIP repos, audio files)
    client_max_body_size 50M;

    # All API traffic → FastAPI on port 8000
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long timeout: Bedrock AI calls (repo analysis = up to 3 min, assessments = 1 min)
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;
    }

    # Voice upload — separate location for clarity, same upstream
    location /api/voice/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  180s;
        client_max_body_size 20M;   # Audio files: ~5MB max, but allow headroom
    }

    # Assessment voice — same
    location /api/assessment/voice/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  180s;
        client_max_body_size 20M;
    }

    # FastAPI Swagger docs (accessible at https://api.thenaliai.in/docs)
    location /docs {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }
}
